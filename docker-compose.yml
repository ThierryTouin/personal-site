services:
  dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: personal-site-dev
    ports:
      - "4321:4321"
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    command: npx astro dev --host 0.0.0.0

  build:
    build:
      context: .
      dockerfile: Dockerfile.build
    container_name: personal-site-build
    ports:
      - "9000:9000"
    volumes:
      - .:/app
      - node_modules_build:/app/node_modules

  tester:
    image: node:22-alpine
    container_name: personal-site-tester
    working_dir: /app
    volumes:
      - ./test/mqtt:/app
    command: sh -c "npm install && echo 'Ready. Use tester-shell to run tests.' && tail -f /dev/null"

volumes:
  node_modules:
  node_modules_build:
